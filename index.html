<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador Logístico Pro - TRANSLIMA</title>

    <style>
        :root { 
            --primary: #3498db; 
            --danger: #e74c3c; 
            --success: #27ae60; 
            --bg: #f4f4f9; 
            --highlight: #c3f7c3;
            --done: #00FF00; 
        }

        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

        .container { 
            max-width: 950px; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column;
            height: 85vh; 
        }

        h2 { margin-top: 0; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

        #status-cloud { font-size: 12px; color: #888; font-weight: normal; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 8px; flex-shrink: 0; }

        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; color: #555; }

        .tab.active { background: var(--primary); color: white; }

        .list-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px;
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
        }

        .item-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white; 
            border: 1px solid #ddd; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
        }

        .item-card.completed { background-color: var(--done) !important; }

        .item-card.invoiced {
            background: #d0ebff !important;
            border-color: #74c0fc;
        }

        .item-text { flex-grow: 1; cursor: pointer; font-size: 14px; color: #333; word-break: break-word; }

        mark {
    background-color: var(--highlight);
    color: #333;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
}

        .actions { display: flex; gap: 10px; align-items: center; margin-left: 15px; }

        .btn-del { color: var(--danger); font-weight: bold; cursor: pointer; border: none; background: none; font-size: 22px; }

        .btn-copy { background: var(--success); color: white; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
 #btn-add {
    position: fixed;
    bottom: 60px;
    right: 60px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
    </style>
</head>

<body>

<div class="container">

    <h2>
        <span>📋 Painel de Cargas</span>
        <span id="status-cloud">☁️ Conectando...</span>
    </h2>

    <div class="tabs">
        <div id="tab-pesos" class="tab active" onclick="switchTab('pesos')">Tara/Peso Balança</div>
        <div id="tab-cte" class="tab" onclick="switchTab('cte')">Orientações</div>
        <div id="tab-clientes" class="tab" onclick="switchTab('clientes')">Embarques</div>
    </div>

    <div id="list" class="list-container">Carregando dados...</div>

</div>

<button id="btn-add" onclick="addItem()">+</button>

<script>

// =====================
// CONFIG SUPABASE
// =====================
const SB_URL = 'https://wzinlkuvktzpajkdgohq.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aW5sa3V2a3R6cGFqa2Rnb2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzY0MDAsImV4cCI6MjA5MjQ1MjQwMH0.01SLd70weP8VqoZ9HWHcWRpkD74s_wBIhKhjKFaZ34k';
const URL_BANCO = `${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab = 'pesos';
let data = { pesos: [], cte: [], clientes: [] };

// =====================
// LOAD
// =====================
async function loadFromCloud() {
    const status = document.getElementById('status-cloud');
    status.innerText = "☁️ Conectando...";

    try {
        const res = await fetch(URL_BANCO, {
            headers: {
                apikey: SB_KEY,
                Authorization: `Bearer ${SB_KEY}`
            }
        });

        if (!res.ok) throw new Error("Erro na API");

        const json = await res.json();

        if (json?.length) {
            data = json[0].dados;
            render();
            status.innerText = "✅ Conectado";
        } else {
            status.innerText = "⚠️ Sem dados";
        }

    } catch (err) {
        console.error(err);
        status.innerText = "❌ Erro conexão";
    }
}

// =====================
// SAVE
// =====================
async function saveToCloud() {
    await fetch(URL_BANCO, {
        method: 'PATCH',
        headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ dados: data })
    });
}

// =====================
// RENDER
// =====================
function render() {
    const listElement = document.getElementById('list');
    listElement.innerHTML = '';

    if (!data[currentTab]) return;

    data[currentTab].forEach((item, index) => {

        const card = document.createElement('div');

        card.className = `item-card ${item.d ? 'completed' : ''}`;

        const checkBtn = currentTab === 'clientes'
            ? `<input type="checkbox" ${item.d ? 'checked' : ''} onclick="toggleDone(${index})">`
            : '';

        card.innerHTML = `
            ${checkBtn}
            <div class="item-text" onclick="editItem(${index})">
                ${formatText(item.t)}
            </div>

            <div class="actions">
                <button class="btn-copy" onclick="copyText(this, ${index})">Copiar</button>
                <button class="btn-del" onclick="deleteItem(${index})">&times;</button>
            </div>
        `;

        listElement.appendChild(card);
    });
}

// =====================
// TOGGLE DONE
// =====================
async function toggleDone(index) {
    data[currentTab][index].d = !data[currentTab][index].d;
    render();
    await saveToCloud();
}

// =====================
// TAB
// =====================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
}

// =====================
// NF
// =====================
async function toggleNF(index) {
    data[currentTab][index].nf = !data[currentTab][index].nf;
    render();
    await saveToCloud();
}

// =====================
// ADD
// =====================
async function addItem() {
    const text = prompt("Digite a nova informação:");
    if (text) {
        data[currentTab].push({ t: text, d: false, nf: false });
        render();
        await saveToCloud();
    }
}

// =====================
// EDIT
// =====================
async function editItem(index) {
    const oldText = data[currentTab][index].t;
    const newText = prompt("Editar informação:", oldText);

    if (newText !== null && newText !== "") {
        data[currentTab][index].t = newText;
        render();
        await saveToCloud();
    }
}

// =====================
// DELETE
// =====================
async function deleteItem(index) {
    if (confirm("Deseja excluir permanentemente?")) {
        data[currentTab].splice(index, 1);
        render();
        await saveToCloud();
    }
}

// =====================
// FORMAT
// =====================
function formatText(text) {
    if (!text) return "";

    return text.replace(/\*(.*?)\*/g, '<mark>$1</mark>');
}

// =====================
// COPY
// =====================
function copyText(btn, index) {
    const rawText = data[currentTab][index].t.replace(/\*/g, '');

    navigator.clipboard.writeText(rawText).then(() => {
        const originalText = btn.innerText;
        btn.innerText = "COPIADO";
        setTimeout(() => btn.innerText = originalText, 800);
    });
}

// =====================
// INIT
// =====================
loadFromCloud();
setInterval(loadFromCloud, 10000);

</script>

</body>
</html>
