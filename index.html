<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciador Logístico Pro - TRANSLIMA</title>

<style>
:root { 
    --primary: #3498db; 
    --danger: #e74c3c; 
    --success: #27ae60; 
    --bg: #f4f4f9; 
    --highlight: #fff3cd; 
    --done: #00FF00; 
}

body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

.container { 
    max-width: 950px; 
    margin: 20px auto; 
    background: white; 
    padding: 20px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    display: flex; 
    flex-direction: column;
    height: 85vh; 
}

h2 { margin-top: 0; display: flex; justify-content: space-between; }

.tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 8px; }

.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; }

.tab.active { background: var(--primary); color: white; }

.list-container { 
    flex-grow: 1; 
    overflow-y: auto; 
    padding: 10px;
    background: #fff;
    border: 1px solid #f0f0f0;
    border-radius: 6px;
}

.item-card { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border: 1px solid #ddd; 
    padding: 12px; 
    margin-bottom: 10px; 
    border-radius: 6px; 
}

.item-text { flex-grow: 1; cursor: pointer; }

.actions { display: flex; gap: 10px; }

.btn-del { color: red; border: none; background: none; font-size: 20px; cursor: pointer; }

.btn-copy { background: green; color: white; border: none; padding: 5px 10px; cursor: pointer; }

.add-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    color: white;
    border: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 28px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>
    <span>📋 Painel de Cargas</span>
    <span id="status-cloud">☁️ Conectado</span>
</h2>

<div class="tabs">
    <div id="tab-pesos" class="tab active" onclick="switchTab('pesos')">Pesos</div>
    <div id="tab-cte" class="tab" onclick="switchTab('cte')">CT-e</div>
    <div id="tab-clientes" class="tab" onclick="switchTab('clientes')">Clientes</div>
</div>

<div id="list" class="list-container"></div>

</div>

<button class="add-btn" onclick="addItem()">+</button>

<script>

// ===== SUPABASE =====
const SB_URL = 'https://zkknrgumodciymbqhboc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpra25yZ3Vtb2RjaXltYnFoYm9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTgyMzQsImV4cCI6MjA5Mjg3NDIzNH0.ynFXs9sZpLK--BB7kcqw911SatirkwePHOm27-S4_cs';

const URL_BANCO = `${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab = 'pesos';
let data = { pesos: [], cte: [], clientes: [] };

// LOAD
async function loadFromCloud() {
    const res = await fetch(URL_BANCO, {
        headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`
        }
    });

    const json = await res.json();

    if (json?.length) {
        data = json[0].dados;
        render();
    }
}

// SAVE
async function saveToCloud() {
    await fetch(URL_BANCO, {
        method: 'PATCH',
        headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ dados: data })
    });
}

// RENDER
function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    data[currentTab].forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'item-card';

        div.innerHTML = `
            <div class="item-text" onclick="editItem(${i})">${item.t}</div>
            <div class="actions">
                <button class="btn-copy" onclick="copyText(${i})">Copiar</button>
                <button class="btn-del" onclick="deleteItem(${i})">x</button>
            </div>
        `;

        list.appendChild(div);
    });
}

// TAB
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
}

// ADD
async function addItem() {
    let msg = "Digite:";
    if(currentTab === 'clientes') msg = "Novo CLIENTE:";

    const text = prompt(msg);
    if (!text) return;

    data[currentTab].push({ t: text });
    render();
    await saveToCloud();
}

// EDIT
async function editItem(i) {
    const t = prompt("Editar:", data[currentTab][i].t);
    if (!t) return;

    data[currentTab][i].t = t;
    render();
    await saveToCloud();
}

// DELETE
async function deleteItem(i) {
    if (!confirm("Excluir?")) return;

    data[currentTab].splice(i,1);
    render();
    await saveToCloud();
}

// COPY
function copyText(i){
    navigator.clipboard.writeText(data[currentTab][i].t);
}

// INIT
loadFromCloud();
setInterval(loadFromCloud, 10000);

</script>

</body>
</html>
