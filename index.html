<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciador Logístico Pro - TRANSLIMA</title>

<style>
:root { 
    --primary:#3498db; 
    --danger:#e74c3c; 
    --success:#27ae60; 
    --bg:#f4f4f9; 
    --highlight:#fff3cd; 
    --done:#00FF00; 
}

body,html{height:100%;margin:0;font-family:'Segoe UI';background:var(--bg);overflow:hidden;}

.container{
    max-width:950px;margin:20px auto;background:#fff;padding:20px;
    border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.1);
    display:flex;flex-direction:column;height:85vh;
}

h2{display:flex;justify-content:space-between;margin:0;}

#status-cloud{font-size:12px;color:#888;}

.tabs{display:flex;gap:5px;margin:15px 0;background:#eee;padding:5px;border-radius:8px;}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:bold;border-radius:6px;}
.tab.active{background:var(--primary);color:#fff;}

.list-container{flex-grow:1;overflow:auto;padding:10px;}

.item-card{
    display:flex;justify-content:space-between;align-items:center;
    border:1px solid #ddd;padding:12px;margin-bottom:10px;border-radius:6px;
}

.item-card.completed{background:var(--done);}

.actions{display:flex;gap:10px;}
.btn-del{background:none;border:none;font-size:22px;color:var(--danger);cursor:pointer;}
.btn-copy{background:var(--success);color:#fff;border:none;padding:6px 12px;cursor:pointer;}

.fab{
    position:fixed;bottom:30px;right:30px;
    background:var(--primary);color:#fff;
    border:none;border-radius:50%;
    width:65px;height:65px;
    font-size:16px;font-weight:bold;
    cursor:pointer;
}

mark{background:var(--highlight);}
</style>
</head>

<body>

<div class="container">

<h2>
<span>📋 Painel de Cargas</span>
<span id="status-cloud">☁️ Conectando...</span>
</h2>

<div class="tabs">
<div id="tab-pesos" class="tab active" onclick="switchTab('pesos')">Pesos/Cargas</div>
<div id="tab-cte" class="tab" onclick="switchTab('cte')">Regras CT-e</div>
<div id="tab-clientes" class="tab" onclick="switchTab('clientes')">Clientes</div>
</div>

<div id="list" class="list-container">Carregando...</div>

</div>

<button id="fabBtn" class="fab" onclick="addItem()">+</button>

<script>

const SB_URL='https://wzinlkuvktzpajkdgohq.supabase.co';
const SB_KEY='SUA_KEY_AQUI';
const URL_BANCO=`${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab='pesos';
let data={pesos:[],cte:[],clientes:[]};

// LOAD
async function loadFromCloud(){
    document.getElementById('status-cloud').innerText='☁️ Carregando...';

    try{
        const res=await fetch(URL_BANCO,{
            headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}
        });

        const json=await res.json();

        if(json?.length){
            data=json[0].dados;
            document.getElementById('status-cloud').innerText='✅ Sincronizado';
            render();
        }

    }catch(e){
        document.getElementById('status-cloud').innerText='❌ Erro';
    }
}

// SAVE
async function saveToCloud(){
    document.getElementById('status-cloud').innerText='☁️ Salvando...';

    await fetch(URL_BANCO,{
        method:'PATCH',
        headers:{
            apikey:SB_KEY,
            Authorization:`Bearer ${SB_KEY}`,
            'Content-Type':'application/json'
        },
        body:JSON.stringify({dados:data})
    });

    document.getElementById('status-cloud').innerText='✅ Salvo';
}

// RENDER
function render(){
    const list=document.getElementById('list');
    list.innerHTML='';

    if(!data[currentTab]) return;

    data[currentTab].forEach((item,i)=>{

        const card=document.createElement('div');
        card.className=`item-card ${item.d?'completed':''}`;

        const check=currentTab==='clientes'
        ? `<input type="checkbox" ${item.d?'checked':''} onclick="toggleDone(${i})">`
        : '';

        card.innerHTML=`
        ${check}
        <div onclick="editItem(${i})">${formatText(item.t)}</div>
        <div class="actions">
            <button class="btn-copy" onclick="copyText(this,${i})">Copiar</button>
            <button class="btn-del" onclick="deleteItem(${i})">&times;</button>
        </div>`;

        list.appendChild(card);
    });

    atualizarBotao();
}

// BOTÃO DINÂMICO
function atualizarBotao(){
    const btn=document.getElementById('fabBtn');

    if(currentTab==='clientes'){
        btn.innerText='+ Cliente';
    }else{
        btn.innerText='+';
    }
}

// FUNÇÕES
async function toggleDone(i){data[currentTab][i].d=!data[currentTab][i].d;render();await saveToCloud();}

function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    render();
}

async function addItem(){
    const msg=currentTab==='clientes'?'Digite o nome do cliente':'Digite a informação';
    const text=prompt(msg);

    if(text){
        data[currentTab].push({t:text,d:false});
        render();
        await saveToCloud();
    }
}

async function editItem(i){
    const n=prompt("Editar:",data[currentTab][i].t);
    if(n){data[currentTab][i].t=n;render();await saveToCloud();}
}

async function deleteItem(i){
    if(confirm("Excluir?")){
        data[currentTab].splice(i,1);
        render();
        await saveToCloud();
    }
}

// FORMAT
function formatText(text){
    if(!text)return "";
    text=text.replace(/\*(.*?)\*/g,'<mark>$1</mark>');
    text=text.replace(/\[NF:(.*?)\]/gi,(m,n)=>`<span style="background:#d0ebff;padding:2px 6px;border-radius:4px">${n}</span>`);
    return text;
}

// COPY
function copyText(btn,i){
    navigator.clipboard.writeText(data[currentTab][i].t.replace(/\*/g,''));
}

// INIT
loadFromCloud();
setInterval(loadFromCloud,10000);

</script>
</body>
</html>
