<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciador Logístico Pro - TRANSLIMA</title>

<style>
:root { 
    --primary: #3498db; 
    --danger: #e74c3c; 
    --success: #27ae60; 
    --bg: #f4f4f9; 
    --highlight: #fff3cd; 
    --done: #00FF00; 
}

body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

.container { 
    max-width: 950px; 
    margin: 20px auto; 
    background: white; 
    padding: 20px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    display: flex; 
    flex-direction: column;
    height: 85vh; 
}

h2 { margin-top: 0; display:flex; justify-content:space-between; }

.tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 8px; }

.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; }

.tab.active { background: var(--primary); color: white; }

.list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }

.item-card { display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd; padding:12px; margin-bottom:10px; border-radius:6px; }

.item-card.completed { background-color: var(--done) !important; }
.item-card.invoiced { background:#d0ebff !important; }
.item-card.finalizado { background:#d3f9d8 !important; }

.item-text { flex-grow:1; cursor:pointer; }

.actions { display:flex; gap:10px; }

</style>
</head>

<body>

<div class="container">

<h2>
<span>📋 Painel de Cargas</span>
<span id="status-cloud">☁️ Conectando...</span>
</h2>

<div class="tabs">
<div id="tab-pesos" class="tab active" onclick="switchTab('pesos')">Pesos/Cargas</div>
<div id="tab-cte" class="tab" onclick="switchTab('cte')">Regras CT-e</div>
<div id="tab-clientes" class="tab" onclick="switchTab('clientes')">Clientes</div>
</div>

<div id="list" class="list-container">Carregando dados...</div>

</div>

<button onclick="addItem()">+</button>

<script>

// CONFIG
const SB_URL = 'https://wzinlkuvktzpajkdgohq.supabase.co';
const SB_KEY = 'SUA_KEY_AQUI';
const URL_BANCO = `${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab = 'pesos';
let data = { pesos: [], cte: [], clientes: [] };

// LOAD
async function loadFromCloud() {
    const res = await fetch(URL_BANCO, {
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    const json = await res.json();
    if (json?.length) {
        data = json[0].dados;
        render();
    }
}

// SAVE
async function saveToCloud() {
    await fetch(URL_BANCO, {
        method: 'PATCH',
        headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ dados: data })
    });
}

// RENDER
function render() {
    const listElement = document.getElementById('list');
    listElement.innerHTML = '';

    if (!data[currentTab]) return;

    data[currentTab].forEach((item, index) => {

        const card = document.createElement('div');

        card.className = `item-card 
            ${item.d ? 'completed' : ''} 
            ${item.nf ? 'invoiced' : ''} 
            ${item.f ? 'finalizado' : ''}`;

        const checkBtn = currentTab === 'clientes'
            ? `<input type="checkbox" ${item.d ? 'checked' : ''} onclick="toggleDone(${index})">`
            : '';

        card.innerHTML = `
            ${checkBtn}
            <div class="item-text" onclick="editItem(${index})">${formatText(item.t)}</div>

            <div class="actions">

                <button onclick="copyText(this, ${index})">Copiar</button>

                <button onclick="toggleNF(${index})">
                    ${item.nf ? 'NF OK' : 'NF'}
                </button>

                <button onclick="toggleFinalizado(${index})">
                    ${item.f ? 'FINALIZADA' : 'FINALIZAR'}
                </button>

                <button onclick="deleteItem(${index})">×</button>

            </div>
        `;

        listElement.appendChild(card);
    });
}

// NOVO: FINALIZADO
async function toggleFinalizado(index) {
    data[currentTab][index].f = !data[currentTab][index].f;
    render();
    await saveToCloud();
}

// RESTO ORIGINAL
async function toggleDone(index) {
    data[currentTab][index].d = !data[currentTab][index].d;
    render();
    await saveToCloud();
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
}

async function toggleNF(index) {
    data[currentTab][index].nf = !data[currentTab][index].nf;
    render();
    await saveToCloud();
}

async function addItem() {
    const text = prompt("Digite a nova informação:");
    if (text) {
        data[currentTab].push({ t: text, d: false, nf: false, f: false });
        render();
        await saveToCloud();
    }
}

async function editItem(index) {
    const oldText = data[currentTab][index].t;
    const newText = prompt("Editar informação:", oldText);
    if (newText !== null && newText !== "") {
        data[currentTab][index].t = newText;
        render();
        await saveToCloud();
    }
}

async function deleteItem(index) {
    if (confirm("Deseja excluir permanentemente?")) {
        data[currentTab].splice(index, 1);
        render();
        await saveToCloud();
    }
}

// NOVO: FORMAT INTELIGENTE
function formatText(text) {
    if (!text) return "";

    text = text.replace(/\*(.*?)\*/g, '<mark>$1</mark>');

    text = text.replace(/Fornecedor:\s*([^\n]+)/gi, (f, g) => {
        return "Fornecedor: " + g.split('+').map(p => `<b>${p.trim()}</b>`).join(' + ');
    });

    text = text.replace(/Cliente:\s*([^\n]+)/gi, (f, g) => {
        return `Cliente: <b>${g}</b>`;
    });

    return text;
}

function copyText(btn, index) {
    const rawText = data[currentTab][index].t.replace(/\*/g, '');
    navigator.clipboard.writeText(rawText);
}

// INIT
loadFromCloud();
setInterval(loadFromCloud, 10000);

</script>

</body>
</html>
