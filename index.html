<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciador Logístico Pro - TRANSLIMA</title>

<style>
:root { 
    --primary: #3498db; 
    --danger: #e74c3c; 
    --success: #27ae60; 
    --bg: #f4f4f9; 
    --highlight: #fff3cd; 
    --done: #00FF00; 
}

/* NF */
.item-card.invoiced {
    background: #d0ebff !important;
    border-color: #74c0fc;
}

body, html { 
    height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; 
}

.container { 
    max-width: 950px; margin: 20px auto; background: white; padding: 20px;
    border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex; flex-direction: column; height: 85vh; 
}

h2 { margin-top: 0; display:flex; justify-content:space-between; }

.tabs { display:flex; gap:5px; margin-bottom:15px; background:#eee; padding:5px; border-radius:8px; }

.tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-weight:bold; }

.tab.active { background: var(--primary); color:white; }

.list-container { flex-grow:1; overflow-y:auto; padding:10px; background:#fff; }

.item-card { 
    display:flex; justify-content:space-between; align-items:center;
    border:1px solid #ddd; padding:12px; margin-bottom:10px; border-radius:6px;
}

.item-card.completed { background: var(--done) !important; }

.item-text { flex-grow:1; cursor:pointer; }

mark { background: var(--highlight); }

.btn-del { color:var(--danger); background:none; border:none; font-size:20px; cursor:pointer; }

.btn-copy { background:var(--success); color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; }

.btn-nf {
    background:#1971c2;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">
<h2>📋 Painel de Cargas <span id="status-cloud">☁️</span></h2>

<div class="tabs">
<div class="tab active" onclick="switchTab('pesos')">Pesos</div>
<div class="tab" onclick="switchTab('cte')">CT-e</div>
<div class="tab" onclick="switchTab('clientes')">Clientes</div>
</div>

<div id="list" class="list-container"></div>
</div>

<button onclick="addItem()">+</button>

<script>

// SUPABASE
const SB_URL = 'https://wzinlkuvktzpajkdgohq.supabase.co';
const SB_KEY = 'SUA_KEY_AQUI';
const URL = `${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab = 'pesos';
let data = { pesos: [], cte: [], clientes: [] };

// LOAD
async function loadFromCloud() {
    const res = await fetch(URL, {
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });

    const json = await res.json();
    if (json?.length) {
        data = json[0].dados;
        render();
    }
}

// SAVE
async function saveToCloud() {
    await fetch(URL, {
        method: 'PATCH',
        headers: {
            apikey: SB_KEY,
            Authorization: `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ dados: data })
    });
}

// FORMAT
function formatText(text) {
    if (!text) return "";

    text = text.replace(/\*(.*?)\*/g, '<mark>$1</mark>');

    text = text.replace(/CS3|RUGRAN|RG GRANITOS/gi, m => {
        return `<span style="background:#ffe066;padding:2px 5px;border-radius:4px;font-weight:bold">${m}</span>`;
    });

    return text;
}

// RENDER
function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    if (!data[currentTab]) return;

    data[currentTab].forEach((item, i) => {
        const div = document.createElement('div');

        div.className = `item-card ${item.d ? 'completed' : ''} ${item.nf ? 'invoiced' : ''}`;

        div.innerHTML = `
            <div class="item-text" onclick="editItem(${i})">
                ${formatText(item.t)}
            </div>

            <div style="display:flex; gap:5px;">
                <button class="btn-nf" onclick="toggleNF(${i})">
                    ${item.nf ? 'NF OK' : 'NF'}
                </button>

                <button class="btn-copy" onclick="copyText(${i})">Copiar</button>

                <button class="btn-del" onclick="deleteItem(${i})">&times;</button>
            </div>
        `;

        list.appendChild(div);
    });
}

// NF
async function toggleNF(i) {
    data[currentTab][i].nf = !data[currentTab][i].nf;
    render();
    await saveToCloud();
}

// ADD
async function addItem() {
    const text = prompt("Digite:");
    if (text) {
        data[currentTab].push({ t: text, d: false, nf: false });
        render();
        await saveToCloud();
    }
}

// EDIT
async function editItem(i) {
    const t = prompt("Editar:", data[currentTab][i].t);
    if (t) {
        data[currentTab][i].t = t;
        render();
        await saveToCloud();
    }
}

// DELETE
async function deleteItem(i) {
    if (confirm("Excluir?")) {
        data[currentTab].splice(i,1);
        render();
        await saveToCloud();
    }
}

// COPY
function copyText(i) {
    navigator.clipboard.writeText(data[currentTab][i].t);
}

// TAB
function switchTab(tab) {
    currentTab = tab;
    render();
}

// INIT
loadFromCloud();
setInterval(loadFromCloud, 10000);

</script>

</body>
</html>
