<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciador Logístico Pro - TRANSLIMA</title>

<style>
:root { 
    --primary: #3498db; 
    --danger: #e74c3c; 
    --success: #27ae60; 
    --bg: #f4f4f9; 
    --highlight: #fff3cd; 
    --done: #00FF00; 
}

body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }

.container { 
    max-width: 950px; 
    margin: 20px auto; 
    background: white; 
    padding: 20px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    display: flex; 
    flex-direction: column;
    height: 85vh; 
}

.tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 8px; }

.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; }

.tab.active { background: var(--primary); color: white; }

.list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }

.item-card { display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd; padding:12px; margin-bottom:10px; border-radius:6px; }

.item-card.completed { background: var(--done) !important; }
.item-card.invoiced { background: #d0ebff !important; }

.item-text { flex-grow:1; cursor:pointer; }

.actions { display:flex; gap:10px; }

</style>
</head>

<body>

<div class="container">
<div class="tabs">
<div id="tab-pesos" class="tab active" onclick="switchTab('pesos')">Pesos</div>
<div id="tab-cte" class="tab" onclick="switchTab('cte')">CTE</div>
<div id="tab-clientes" class="tab" onclick="switchTab('clientes')">Clientes</div>
</div>

<div id="list" class="list-container"></div>
</div>

<button onclick="addItem()">+</button>

<script>

const SB_URL = 'https://wzinlkuvktzpajkdgohq.supabase.co';
const SB_KEY = 'SUA_KEY_AQUI';
const URL = `${SB_URL}/rest/v1/painel?id=eq.1`;

let currentTab = 'pesos';
let data = { pesos: [], cte: [], clientes: [] };

// LOAD
async function loadFromCloud(){
    const res = await fetch(URL,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    const json = await res.json();
    if(json?.length){ data = json[0].dados; render(); }
}

// SAVE
async function saveToCloud(){
    await fetch(URL,{
        method:'PATCH',
        headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
        body:JSON.stringify({dados:data})
    });
}

// RENDER
function render(){
    const list=document.getElementById('list');
    list.innerHTML='';

    (data[currentTab]||[]).forEach((item,index)=>{

        const card=document.createElement('div');
        card.className=`item-card ${item.d?'completed':''} ${item.nf?'invoiced':''}`;

        card.innerHTML=`
            <div class="item-text" onclick="editItem(${index})">${formatText(item.t)}</div>

            <div class="actions">

                <button onclick="copyText(this,${index})">Copiar</button>

                <button onclick="toggleNF(${index})">
                    ${item.nf?'NF OK':'NF'}
                </button>

                <button onclick="toggleFinalizado(${index})">
                    ${item.f?'FINALIZADA':'FINALIZAR'}
                </button>

                <button onclick="deleteItem(${index})">×</button>

            </div>
        `;

        list.appendChild(card);
    });
}

// TOGGLES
async function toggleNF(i){
    data[currentTab][i].nf=!data[currentTab][i].nf;
    render(); await saveToCloud();
}

async function toggleFinalizado(i){
    data[currentTab][i].f=!data[currentTab][i].f;
    render(); await saveToCloud();
}

// TAB
function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    render();
}

// ADD
async function addItem(){
    const text=prompt("Digite:");
    if(text){
        data[currentTab].push({t:text,d:false,nf:false,f:false});
        render(); await saveToCloud();
    }
}

// EDIT
async function editItem(i){
    const n=prompt("Editar:",data[currentTab][i].t);
    if(n){ data[currentTab][i].t=n; render(); await saveToCloud(); }
}

// DELETE
async function deleteItem(i){
    if(confirm("Excluir?")){
        data[currentTab].splice(i,1);
        render(); await saveToCloud();
    }
}

// FORMAT INTELIGENTE
function formatText(text){
    if(!text) return "";

    text=text.replace(/\*(.*?)\*/g,'<mark>$1</mark>');

    text=text.replace(/Fornecedor:\s*([^\n]+)/gi,(f,g)=>{
        return "Fornecedor: "+g.split('+').map(p=>`<b>${p.trim()}</b>`).join(' + ');
    });

    text=text.replace(/Cliente:\s*([^\n]+)/gi,(f,g)=>{
        return `Cliente: <b>${g}</b>`;
    });

    return text;
}

// COPY
function copyText(btn,i){
    navigator.clipboard.writeText(data[currentTab][i].t);
}

// INIT
loadFromCloud();
setInterval(loadFromCloud,10000);

</script>

</body>
</html>
